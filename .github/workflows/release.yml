# Build + publish a macOS release whenever a v* tag is pushed.
#   git tag v0.2.0 && git push origin v0.2.0
name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  mac:
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate Firebase desktop config
        run: node scripts/write-firebase-config.cjs
        env:
          # This must be a rotated client key restricted to Identity Toolkit
          # and Token Service. Never reuse a Gemini/Generative Language key.
          KAISOLA_FIREBASE_API_KEY: ${{ secrets.KAISOLA_FIREBASE_API_KEY }}
          KAISOLA_GOOGLE_CLIENT_SECRET: ${{ secrets.KAISOLA_GOOGLE_CLIENT_SECRET }}
      # --publish never: the gh-release step below uploads the artifacts;
      # electron-builder must not try to publish on its own (it has no token)
      - run: npm run dist -- --publish never
        env:
          # Developer ID signing + notarization. If the secrets are unset,
          # electron-builder falls back to skipping both (adhoc-sign.cjs then
          # covers the signature) — the build still succeeds.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # stable-named copy so the site can link releases/latest/download/Kaisola.dmg
      - run: cp release/Kaisola-*.dmg release/Kaisola.dmg
      - uses: softprops/action-gh-release@v2
        with:
          # latest-mac.yml is the auto-update manifest — the installed app
          # (electron-updater) polls it to learn a new version exists
          files: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          generate_release_notes: true
