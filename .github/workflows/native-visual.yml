name: native-visual

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/native-visual.yml'
      - 'native/KaisolaMac/**'

permissions:
  contents: read

concurrency:
  group: native-visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Resolve native app version
        run: >-
          node -e
          "require('fs').appendFileSync(process.env.GITHUB_ENV,
          'KAISOLA_VISUAL_VERSION=' + require('./package.json').version + '\\n')"

      - name: Build native visual fixture
        run: >-
          xcodebuild
          -project native/KaisolaMac/KaisolaMac.xcodeproj
          -scheme KaisolaMacPreview
          -configuration Debug
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/kaisola-native-visual"
          MARKETING_VERSION="$KAISOLA_VISUAL_VERSION"
          CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Capture workspace, document, Mesh, Settings, and Usage states
        shell: bash
        run: |
          set -euo pipefail
          app="$RUNNER_TEMP/kaisola-native-visual/Build/Products/Debug/KaisolaMacPreview.app"
          binary="$app/Contents/MacOS/KaisolaMacPreview"
          output="$RUNNER_TEMP/kaisola-native-screenshots"
          mkdir -p "$output"

          for surface in terminal terminal-solo preview preview-html preview-docx topbar mesh settings usage; do
            capture="$output/$surface.png"
            env \
              KAISOLA_NATIVE_VISUAL_FIXTURE=1 \
              KAISOLA_NATIVE_VISUAL_SURFACE="$surface" \
              KAISOLA_NATIVE_VISUAL_WORKSPACE="$GITHUB_WORKSPACE" \
              KAISOLA_NATIVE_VISUAL_CAPTURE_PATH="$capture" \
              "$binary"
            test -s "$capture"
            sips -g pixelWidth -g pixelHeight "$capture"
          done

      - name: Upload native visual inspection set
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-visual-${{ github.sha }}
          path: ${{ runner.temp }}/kaisola-native-screenshots/*.png
          if-no-files-found: error
          retention-days: 14
