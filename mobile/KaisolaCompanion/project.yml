name: KaisolaCompanion

options:
  bundleIdPrefix: com.kaisola
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.3.0
    # Michael's Apple Developer team — matches the registered App ID prefix.
    DEVELOPMENT_TEAM: KBD9RS8425

targets:
  KaisolaCompanion:
    type: application
    platform: iOS
    info:
      path: KaisolaCompanion/Account/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.kaisola.companion.auth
            CFBundleURLSchemes:
              - kaisola
    sources:
      - path: KaisolaCompanion
      - path: ../../electron/companion/fixtures
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaisola.companion
        MARKETING_VERSION: 0.3.0
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Kaisola
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Kaisola discovers and securely connects to your paired Mac on the local network.
        INFOPLIST_KEY_NSCameraUsageDescription: Kaisola uses the camera to scan the pairing code shown on your Mac.
        INFOPLIST_KEY_NSBonjourServices:
          - _kaisola._tcp
        # Standard-algorithm end-to-end encryption qualifies for the mass-market
        # exemption; declaring it here skips the per-build compliance prompt.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic

  KaisolaCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KaisolaCompanionTests
      - path: ../../electron/companion/fixtures
        buildPhase: resources
    dependencies:
      - target: KaisolaCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaisola.companion.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

schemes:
  KaisolaCompanion:
    build:
      targets:
        KaisolaCompanion: all
        KaisolaCompanionTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: KaisolaCompanionTests
