# Build + publish a macOS release whenever a v* tag is pushed.
#   git tag v0.2.0 && git push origin v0.2.0
name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  swift-contracts:
    uses: ./.github/workflows/swift-contracts.yml
  mac:
    needs: swift-contracts
    runs-on: macos-14 # Apple Silicon
    steps:
      # Pin action code to immutable commits so a moved upstream tag cannot
      # silently change what runs inside the release job.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - name: Install exact dependencies
        run: npm ci --prefer-offline --no-audit --no-fund
        env:
          # electron-builder repeats this architecture-specific rebuild during
          # packaging, so skip the otherwise duplicate postinstall pass.
          KAISOLA_SKIP_NATIVE_REBUILD: '1'
      - name: Generate Firebase desktop config
        run: node scripts/write-firebase-config.cjs
        env:
          # This must be a rotated client key restricted to Identity Toolkit
          # and Token Service. Never reuse a Gemini/Generative Language key.
          KAISOLA_FIREBASE_API_KEY: ${{ secrets.KAISOLA_FIREBASE_API_KEY }}
          # Public endpoint only; authentication remains a short-lived Firebase
          # token exchanged for a one-use relay ticket.
          KAISOLA_LINK_URL: https://kaisola-link.michaelofengend.workers.dev
      - name: Require release signing and notarization credentials
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            test -n "${!name:-}" || { echo "Missing required release credential: $name" >&2; exit 1; }
          done
      # --publish never: the gh-release step below uploads the artifacts;
      # electron-builder must not try to publish on its own (it has no token)
      - run: npm run dist -- --publish never
        env:
          # Developer ID signing + notarization. The release job requires these
          # above; only local packaging may fall back to an ad-hoc signature.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # stable-named copy so the site can link releases/latest/download/Kaisola.dmg
      - run: cp release/Kaisola-*.dmg release/Kaisola.dmg
      - name: Create and verify release checksums
        run: |
          set -euo pipefail
          for artifact in release/*.dmg release/*.zip release/latest-mac.yml; do
            shasum -a 256 "$artifact" > "$artifact.sha256"
          done
          for checksum in release/*.sha256; do
            shasum -a 256 --check "$checksum"
          done
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          # latest-mac.yml is the auto-update manifest — the installed app
          # (electron-updater) polls it to learn a new version exists
          files: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
            release/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
  # The native preview needs macos-15 Xcode and Apple notarization; it runs
  # AFTER the Electron release publishes so a preview-only failure can never
  # block the daily-driver channel, and appends its assets to the same release.
  native:
    needs: [swift-contracts, mac]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - name: Install exact dependencies
        run: npm ci --prefer-offline --no-audit --no-fund
        env:
          KAISOLA_SKIP_NATIVE_REBUILD: '1'
      - name: Require release signing and notarization credentials
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            test -n "${!name:-}" || { echo "Missing required release credential: $name" >&2; exit 1; }
          done
      - name: Download native preview helper runtimes
        run: npm run native:helper:download
      - name: Import Developer ID certificate for native preview
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/kaisola-native-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/kaisola-native-signing.p12"
          keychain_password="$(openssl rand -hex 32)"
          umask 077
          printf '%s' "$CSC_LINK" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
      - name: Build Developer ID native preview
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # Run attempts share GITHUB_RUN_NUMBER, so a rerun must still mint a
          # strictly newer Sparkle bundle version and a distinct artifact name;
          # otherwise a rerun would re-sign different bytes at the same URL.
          native_build="$((1000 + GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))"
          echo "NATIVE_BUILD_VERSION=$native_build" >> "$GITHUB_ENV"
          xcodebuild \
            -project native/KaisolaMac/KaisolaMac.xcodeproj \
            -scheme KaisolaMacPreview \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/kaisola-native" \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS=--timestamp \
            MARKETING_VERSION="${GITHUB_REF_NAME#v}" \
            CURRENT_PROJECT_VERSION="$native_build" \
            KAISOLA_SPARKLE_FEED_URL='https://github.com/michaelofengenden/kaisola/releases/download/native-preview/appcast.xml' \
            KAISOLA_SPARKLE_PUBLIC_ED_KEY='FAk/3R33fKfyvsHiUKiNctprqxw/Y/guajgQXGb8r60=' \
            build
      - name: Verify native preview release package
        run: |
          npm run native:preflight -- \
            --app "$RUNNER_TEMP/kaisola-native/Build/Products/Release/KaisolaMacPreview.app" \
            --require-updates --require-developer-id
      - name: Notarize, staple, and package native preview
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          app="$RUNNER_TEMP/kaisola-native/Build/Products/Release/KaisolaMacPreview.app"
          version="${GITHUB_REF_NAME#v}"
          artifact_directory="$GITHUB_WORKSPACE/release/native"
          # The bundle version in the name keeps every published archive URL
          # immutable across workflow reruns; the appcast references exactly
          # one of them.
          artifact_name="KaisolaMacPreview-${version}-b${NATIVE_BUILD_VERSION}.zip"
          artifact="$artifact_directory/$artifact_name"
          mkdir -p "$artifact_directory"
          ditto -c -k --keepParent "$app" "$artifact"
          xcrun notarytool submit "$artifact" \
            --wait \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          xcrun stapler staple "$app"
          rm -f "$artifact"
          ditto -c -k --keepParent "$app" "$artifact"
          spctl --assess --type execute --verbose "$app"
          # Verify the bytes actually being published, not the build tree:
          # unpack the final archive and hold it to the notarized standard.
          unpack_directory="$RUNNER_TEMP/kaisola-native-unpack"
          rm -rf "$unpack_directory"
          ditto -x -k "$artifact" "$unpack_directory"
          npm run native:preflight -- \
            --app "$unpack_directory/KaisolaMacPreview.app" \
            --require-updates --require-notarized
          packaged_build="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$unpack_directory/KaisolaMacPreview.app/Contents/Info.plist")"
          test "$packaged_build" = "$NATIVE_BUILD_VERSION" || { echo "bundle version $packaged_build != $NATIVE_BUILD_VERSION" >&2; exit 1; }
          (
            cd "$artifact_directory"
            shasum -a 256 "$artifact_name" > "$artifact_name.sha256"
            shasum -a 256 --check "$artifact_name.sha256"
          )
      - name: Clean up native signing keychain
        if: ${{ always() }}
        run: |
          keychain_path="$RUNNER_TEMP/kaisola-native-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/kaisola-native-signing.p12"
          security delete-keychain "$keychain_path" || true
          rm -f "$certificate_path"
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            release/native/*.zip
            release/native/*.zip.sha256
          generate_release_notes: false
          fail_on_unmatched_files: true
